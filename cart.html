}
<!DOCTYPE html>
<html>
<head>
<title>Cart</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Cart Items</h2>
<ul id="cart"></ul>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let list = document.getElementById("cart");

cart.forEach(item => {
 let li = document.createElement("li");
 li.innerText = item.item + " - ₹" + item.price;
 list.appendChild(li);
});
</script>

</body>
</html
